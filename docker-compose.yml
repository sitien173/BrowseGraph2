services:
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-change-me}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p \"${NEO4J_PASSWORD:-change-me}\" \"RETURN 1;\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me}
      API_KEY_SECRET: ${API_KEY_SECRET:-change-me}
      RELATED_THRESHOLD: ${RELATED_THRESHOLD:-7}

volumes:
  neo4j_data:
  neo4j_logs:
